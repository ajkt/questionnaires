<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>[ajkt] Overview of Common HCI Questionnaires</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bulma@0.9.4/css/bulma.min.css">
  <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
  <style>
    body { padding: 2rem; }

    /* ── Table layout ── */
    #scales-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.9rem;
    }

    #scales-table thead th {
      background: #f5f5f5;
      border-bottom: 2px solid #dbdbdb;
      padding: 8px 10px;
      text-align: left;
      cursor: pointer;
      user-select: none;
      white-space: nowrap;
    }

    #scales-table thead th:hover {
      background: #ececec;
    }

    #scales-table thead th.sort-asc::after  { content: " ▲"; font-size: 0.75em; }
    #scales-table thead th.sort-desc::after { content: " ▼"; font-size: 0.75em; }

    #scales-table tbody tr.data-row {
      border-bottom: 1px solid #e8e8e8;
      cursor: pointer;
      transition: background 0.15s;
    }

    #scales-table tbody tr.data-row:hover {
      background: #fffbdd;
    }

    #scales-table tbody tr.data-row.detail-open {
      background: #fffbdd;
      font-weight: 500;
    }

    #scales-table tbody td {
      padding: 10px;
      vertical-align: top;
    }

    /* ── Detail row ── */
    tr.detail-row td {
      padding: 0;
      border-bottom: 2px solid #dbdbdb;
    }

    .detail-inner {
      padding: 14px 16px;
      background: #fafafa;
      border-top: 2px solid #3273dc;
    }

    .detail-inner table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.875rem;
      margin-top: 8px;
    }

    .detail-inner table th,
    .detail-inner table td {
      padding: 6px 10px;
      border: 1px solid #e0e0e0;
      vertical-align: top;
      font-size: 0.6rem;
    }

    .detail-inner table th {
      background: #f0f0f0;
      font-weight: 500;
    }

    .detail-inner code {
      white-space: pre-wrap;
      word-break: break-word;
      font-size: 0.5rem;
    }

    /* ── Filter ── */
    #search-input { max-width: 300px; }
  </style>
</head>
<body class="section">
  <div class="container">
    <h1 class="title">Questionnaires Dataset <span class="tag is-warning is-light">work-in-progress</span></h1>

    <div class="field">
      <label class="label">Filter</label>
      <div class="control">
        <input id="search-input" class="input" type="text"
               placeholder="Type to filter instruments...">
      </div>
      <p class="help">Filters across instrument fields (not origins).</p>
    </div>

    <table id="scales-table">
      <thead>
        <tr>
          <th data-field="abbrev">Abbrev</th>
          <th data-field="name">Name</th>
          <th data-field="numSubscales"># Subscales</th>
          <th data-field="subscaleNames">Subscales</th>
          <th data-field="itemsTotal">Items Total</th>
          <th data-field="itemsPerSubscale">Items p/Subscale</th>
          <th data-field="scaleTypeRange">Scale Type &amp; Range</th>
          <th data-field="scaleLabels">Scale Labels</th>
          <th data-field="reverseCoded">Items Reversed?</th>
        </tr>
      </thead>
      <tbody id="table-body"></tbody>
    </table>

    <p id="status" class="has-text-grey mt-3"></p>
  </div>

  <script>
    // ── State ──────────────────────────────────────────────────────────────
    let instrumentsData = [];
    let originsData     = [];
    let sortField       = null;
    let sortDir         = "asc";   // "asc" | "desc"
    let filterText      = "";

    const FIELDS = [
      "abbrev","name","numSubscales","subscaleNames",
      "itemsTotal","itemsPerSubscale","scaleTypeRange",
      "scaleLabels","reverseCoded"
    ];

    // ── CSV loading ────────────────────────────────────────────────────────
    function loadCSVFiles() {
      setStatus("Loading data...");

      let instrumentsDone = false;
      let originsDone     = false;

      function checkDone() {
        if (instrumentsDone && originsDone) {
          setStatus("");
          renderTable();
        }
      }

      Papa.parse("data.csv", {
        header: true,
        download: true,
        skipEmptyLines: true,
        complete: function(results) {
          instrumentsData = results.data;
          instrumentsDone = true;
          checkDone();
        },
        error: function(err) { setStatus("Error loading data.csv: " + err.message); }
      });

      Papa.parse("subrows.csv", {
        header: true,
        download: true,
        skipEmptyLines: true,
        complete: function(results) {
          originsData = results.data;
          originsDone = true;
          checkDone();
        },
        error: function(err) { setStatus("Error loading origins.csv: " + err.message); }
      });
    }

    // ── Render ─────────────────────────────────────────────────────────────
    function getFilteredSorted() {
      let rows = instrumentsData.slice();

      // Filter
      if (filterText) {
        const q = filterText.toLowerCase();
        rows = rows.filter(r =>
          FIELDS.some(f => (r[f] || "").toLowerCase().includes(q))
        );
      }

      // Sort
      if (sortField) {
        rows.sort(function(a, b) {
          const av = (a[sortField] || "").toLowerCase();
          const bv = (b[sortField] || "").toLowerCase();
          if (av < bv) return sortDir === "asc" ? -1 :  1;
          if (av > bv) return sortDir === "asc" ?  1 : -1;
          return 0;
        });
      }

      return rows;
    }

    function renderTable() {
      const tbody = document.getElementById("table-body");
      tbody.innerHTML = "";

      const rows = getFilteredSorted();

      if (rows.length === 0) {
        tbody.innerHTML = `<tr><td colspan="${FIELDS.length}" class="has-text-grey" style="padding:12px">No results.</td></tr>`;
        return;
      }

      rows.forEach(function(inst) {
        // ── Data row ──
        const tr = document.createElement("tr");
        tr.className = "data-row";
        tr.dataset.abbrev = inst.abbrev;

        FIELDS.forEach(function(f) {
          const td = document.createElement("td");
          td.textContent = inst[f] || "";
          tr.appendChild(td);
        });

        // ── Detail row (hidden until click) ──
        const detailTr = document.createElement("tr");
        detailTr.className = "detail-row";
        detailTr.style.display = "none";

        const detailTd = document.createElement("td");
        detailTd.colSpan = FIELDS.length;

        const inner = document.createElement("div");
        inner.className = "detail-inner";
        inner.innerHTML = buildDetailHTML(inst);

        detailTd.appendChild(inner);
        detailTr.appendChild(detailTd);

        // ── Click to toggle ──
        tr.addEventListener("click", function() {
          const isOpen = tr.classList.contains("detail-open");

          // Close all open rows first
          document.querySelectorAll("tr.data-row.detail-open").forEach(function(openTr) {
            openTr.classList.remove("detail-open");
            openTr.nextElementSibling.style.display = "none";
          });

          // If it wasn't open, open it
          if (!isOpen) {
            tr.classList.add("detail-open");
            detailTr.style.display = "";
          }
        });

        tbody.appendChild(tr);
        tbody.appendChild(detailTr);
      });
    }

    // ── Detail HTML builder ────────────────────────────────────────────────
    function buildDetailHTML(inst) {
      const abbrev = inst.abbrev;
      const originRows = originsData.filter(o => o.instrumentAbbrev === abbrev);

      let headerHtml = `
      
      `;

      if (originRows.length === 0) {
        return headerHtml + `<p><em>No origin information available for ${abbrev}.</em></p>`;
      }

      let tableHtml = `
        <strong>Relevant resources</strong>
        <table>
          <thead>
            <tr>
              <th>#</th>
              <th>Origin Paper</th>
              <th>Link</th>
              <th>Notes</th>
              <th>BibTex</th>
            </tr>
          </thead>
          <tbody>
            ${originRows.map((o, idx) => `
              <tr>
                <td>${idx + 1}</td>
                <td>${o.originPaper || ""}</td>
                <td>${o.originLink
                  ? `<a href="${o.originLink}" target="_blank">link</a>`
                  : ""}</td>
                <td>${o.notes || ""}</td>
                <td><code>${(o.originBibtex || "").replace(/</g, "&lt;")}</code></td>
		</tr>
            `).join("")}
          </tbody>
        </table>
      `;

      return headerHtml + tableHtml;
    }

    // ── Sorting ────────────────────────────────────────────────────────────
    document.querySelectorAll("#scales-table thead th").forEach(function(th) {
      th.addEventListener("click", function() {
        const field = th.dataset.field;
        if (sortField === field) {
          sortDir = sortDir === "asc" ? "desc" : "asc";
        } else {
          sortField = field;
          sortDir = "asc";
        }

        // Update header classes
        document.querySelectorAll("#scales-table thead th").forEach(function(h) {
          h.classList.remove("sort-asc", "sort-desc");
        });
        th.classList.add(sortDir === "asc" ? "sort-asc" : "sort-desc");

        renderTable();
      });
    });

    // ── Filtering ──────────────────────────────────────────────────────────
    document.getElementById("search-input").addEventListener("input", function() {
      filterText = this.value.trim();
      renderTable();
    });

    // ── Status helper ──────────────────────────────────────────────────────
    function setStatus(msg) {
      document.getElementById("status").textContent = msg;
    }

    // ── Boot ───────────────────────────────────────────────────────────────
    loadCSVFiles();
  </script>
</body>
</html>
