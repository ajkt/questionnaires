<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Overview of Common HCI Questionnaires</title>

  <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bulma@0.9.4/css/bulma.min.css">

  <link rel="stylesheet"
        href="https://unpkg.com/tabulator-tables@5.6.0/dist/css/tabulator.min.css">

  <style>
    #search-input { max-width: 300px; }
    .tabulator-row:hover {
      background-color: #fffbdd !important;
      cursor: pointer;
    }
  </style>

</head>


<body class="section">
  <div class="container">
    <h1 class="title">Dataset [work-in-progress]</h1>


    <!-- Keyword filter -->
    <div class="field">
      <label class="label">Filter</label>
      <div class="control">
        <input id="search-input" class="input" type="text"
               placeholder="Type to filter instruments...">
      </div>
      <p class="help">Filters across instrument fields (not origins).</p>
    </div>

    <!-- Tabulator container -->
    <div id="scales-table"></div>

    <p id="status" class="has-text-grey"></p>
  </div>

  <!-- PapaParse -->
  <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>

  <!-- Tabulator JS -->
  <script src="https://unpkg.com/tabulator-tables@5.6.0/dist/js/tabulator.min.js"></script>

  <script>
    let table;
    let originsData = [];  // all origin rows from origins.csv

    async function loadCSVFiles() {
      const statusEl = document.getElementById('status');

      try {
        statusEl.textContent = 'Loading data...';

        // Load instruments (data.csv)
        const [instRes, origRes] = await Promise.all([
          fetch('data.csv'),
          fetch('subrows.csv'),
        ]);

        if (!instRes.ok) throw new Error('data.csv HTTP ' + instRes.status);
        if (!origRes.ok) throw new Error('subrows.csv HTTP ' + origRes.status);

        const instText = await instRes.text();
        const origText = await origRes.text();

        const instResult = Papa.parse(instText, { header: true, skipEmptyLines: true });
        const origResult = Papa.parse(origText, { header: true, skipEmptyLines: true });

        if (instResult.errors.length) console.warn('data.csv parse errors', instResult.errors);
        if (origResult.errors.length) console.warn('subrows.csv parse errors', origResult.errors);

        const instruments = instResult.data;
        originsData = origResult.data;

        statusEl.textContent = `Loaded ${instruments.length} instruments, ${originsData.length} origin rows.`;

        initTable(instruments);
      } catch (e) {
        console.error(e);
        statusEl.textContent = 'Failed to load CSV files: ' + e.message;
      }
    }

    function initTable(instruments) {
      const columns = [
        {title: "Abbrev", field: "abbrev", width: 90},
        {title: "Name", field: "name"},
        {title: "# Subscales", field: "numSubscales", hozAlign: "center"},
        {title: "Items Total", field: "itemsTotal", hozAlign: "center"},
	{title: "Items p/Subscale", field: "itemsPerSubscale", hozAlign: "center"},
	{title: "Scale Type & Range", field: "scaleTypeRange", hozAlign: "center"},
	{title: "Scale Labels", field: "scaleLabels", hozAlign: "center"},
	{title: "Items Reversed?", field: "reverseCoded", hozAlign: "center"},
      ];

      table = new Tabulator("#scales-table", {
        data: instruments,
        layout: "fitColumns",
        columns: columns,

        // Row detail with sub-table of origin rows
        rowDetail: {
          format: function(row) {
            const inst = row.getData();
            const abbrev = inst.abbrev;

            // Filter origins for this instrument
            const originRows = originsData.filter(o => o.instrumentAbbrev === abbrev);

            const container = document.createElement("div");
            container.style.padding = "10px";
            container.style.background = "#f7f7f7";
            container.style.borderTop = "1px solid #ddd";

            // Header info
            let headerHtml = `
              <div style="margin-bottom:10px;">
                <strong>Instrument:</strong> ${inst.abbrev} — ${inst.name}<br>
                <strong>Items total:</strong> ${inst.itemsTotal || ""}<br>
                <strong>Subscales:</strong> ${inst.numSubscales || ""}
              </div>
            `;

            // Origin sub-table
            let originHtml = "";

            if (originRows.length === 0) {
              originHtml = `<p><em>No origin information available for ${abbrev}.</em></p>`;
            } else {
              originHtml += `
                <h4 class="title is-6" style="margin-top:5px;">Origins</h4>
                <table class="table is-narrow is-fullwidth">
                  <thead>
                    <tr>
                      <th>#</th>
                      <th>Origin Paper</th>
                      <th>Link</th>
                      <th>BibTeX</th>
                      <th>Notes</th>
                    </tr>
                  </thead>
                  <tbody>
              `;

              originRows.forEach((o, idx) => {
                originHtml += `
                  <tr>
                    <td>${idx + 1}</td>
                    <td>${o.originPaper || ""}</td>
                    <td>${o.originLink ? `<a href="${o.originLink}" target="_blank">link</a>` : ""}</td>
                    <td><code>${(o.originBibtex || "").replace(/</g, "&lt;")}</code></td>
                    <td>${o.notes || ""}</td>
                  </tr>
                `;
              });

              originHtml += `
                  </tbody>
                </table>
              `;
            }

            container.innerHTML = headerHtml + originHtml;
            return container;
          },
          height: "auto",
        },

        rowClick: function(e, row) {
          row.toggleDetails();
        },
      });

      setupFiltering();
    }

    function setupFiltering() {
      const input = document.getElementById('search-input');
      input.addEventListener('input', () => {
        const q = input.value.toLowerCase();

        if (!q) {
          table.clearFilter();
          return;
        }

        table.setFilter(function(data) {
          const text = Object.values(data)
            .map(v => (v ?? '').toString())
            .join(' ')
            .toLowerCase();
          return text.includes(q);
        });
      });
    }

    window.addEventListener('DOMContentLoaded', loadCSVFiles);
  </script>
</body>
</html>
